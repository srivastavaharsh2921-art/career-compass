<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="auth-guard.js"></script>
  <title>Login | Career Compass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container login-container-wrapper">
    <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; margin-bottom: 40px; font-weight: 700;">
      <i class="fa-solid fa-arrow-left"></i> Back to home
    </a>
    <section class="login-section" style="margin-bottom: 0;">
      <div class="login-card">
        <div class="login-header">
          <div class="auth-brand"><img src="careercompass-logo.png" class="auth-brand-logo" alt="Career Compass logo"> Career Compass</div>
          <h1>Login</h1>
          <p>Sign in to your Career Compass account</p>
        </div>
        <form class="login-form" data-auth="login">
          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-envelope input-icon"></i>
              <input type="email" id="email" name="email" autocomplete="username" placeholder="Enter your email" required>
            </div>
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="password" name="password" autocomplete="current-password" minlength="6" placeholder="Enter your password" required>
              <i class="fa-regular fa-eye-slash toggle-password"></i>
            </div>
          </div>
          <div class="form-actions">
            <label class="checkbox-container">
              <input type="checkbox" checked>
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
          </div>
          <button type="submit" class="btn-submit">
            Login <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>
        <div class="auth-trust-note">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
          <span>This form accepts Career Compass account credentials only. We never ask for your Google or LinkedIn password.</span>
        </div>
        <div class="login-footer">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
      </div>
    </section>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailInput = document.querySelector('#email');
      const emailFromReset = new URLSearchParams(location.search).get('email');
      if (emailInput && emailFromReset) emailInput.value = emailFromReset;
      const passwordInput = document.querySelector('#password');
      const togglePassword = document.querySelector('.toggle-password');
      if (passwordInput && togglePassword) {
        togglePassword.addEventListener('click', () => {
          const isVisible = passwordInput.type === 'text';
          passwordInput.type = isVisible ? 'password' : 'text';
          togglePassword.classList.toggle('fa-eye', !isVisible);
          togglePassword.classList.toggle('fa-eye-slash', isVisible);
        });
      }
    });
  </script>
  <script src="api.js"></script>
</body>
</html>
