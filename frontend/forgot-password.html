<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Career Compass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container login-container-wrapper">
    <a href="login.html" style="display: inline-flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; margin-bottom: 40px; font-weight: 700;">
      <i class="fa-solid fa-arrow-left"></i> Back to login
    </a>
    <section class="login-section" style="margin-bottom: 0;">
      <div class="login-card">
        <div class="login-header">
          <div class="auth-brand"><i class="fa-regular fa-compass"></i> Career Compass</div>
          <h1>Reset password</h1>
          <p>We’ll send a one-time code to your account email.</p>
        </div>

        <form class="login-form" data-auth="forgot-password">
          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-envelope input-icon"></i>
              <input type="email" id="email" name="email" autocomplete="email" placeholder="Enter your account email" required>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            Send reset code <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>

        <p id="reset-status" class="reset-status" role="status" aria-live="polite" hidden></p>

        <form class="login-form" data-auth="reset-password" hidden>
          <hr class="reset-divider">
          <h2 class="reset-subheading">Enter your reset code</h2>
          <input type="hidden" name="email">
          <div class="input-group">
            <label for="code">6-digit code</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-key input-icon"></i>
              <input type="text" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
            </div>
          </div>
          <div class="input-group">
            <label for="password">New password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" placeholder="At least 6 characters" required>
            </div>
          </div>
          <div class="input-group">
            <label for="confirm">Confirm new password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock input-icon"></i>
              <input type="password" id="confirm" name="confirm" autocomplete="new-password" minlength="6" placeholder="Repeat your new password" required>
            </div>
          </div>
          <button type="submit" class="btn-submit">
            Reset password <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <div class="auth-trust-note">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
          <span>Reset codes expire after 10 minutes and can only be used once.</span>
        </div>
        <div class="login-footer">
          Remembered it? <a href="login.html">Log in</a>
        </div>
      </div>
    </section>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const email = params.get('email');
      const code = params.get('code');
      if (email) document.querySelectorAll('[name="email"]').forEach(input => { input.value = email; });
      if (code) {
        document.querySelector('[name="code"]').value = code;
        document.querySelector('[data-auth="reset-password"]').hidden = false;
        document.querySelector('#reset-status').hidden = true;
      }
    });
  </script>
  <script src="api.js"></script>
</body>
</html>
